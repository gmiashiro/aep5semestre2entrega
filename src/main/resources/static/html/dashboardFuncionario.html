<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboardCards.css">
    <link rel="stylesheet" href="../css/dashboardFuncionario.css">
    <title>ObservaAção - Solicitações</title>
</head>
<body>
    <header>
        <!-- Parte da LOGO -->
        <div class="header-logo">
            <a href="./landingPage.html" class="logo">ObservaAção</a>
            <a href="./landingPage.html" class="header-button">Como usar?</a>
        </div>
        <!-- Parte do botão do perfil do usuário -->
        <div class="header-profile">
            <button class="profile-button">
                <img src="../assets/icons/userProfile.svg" alt="Ícone de perfil do usuário">
            </button>
            <div class="shadow-box profile-window-container window-hidden">
                <div class="exit-button-container">
                    <button class="exit-button">
                        <img src="../assets/icons/error.svg" alt="Ícone de fechar">
                    </button>
                </div>
                <div class="profile-window-info-container">
                    <span class="profile-window-title">Perfil</span>
                    <div class="profile-window-data">
                        <img src="../assets/icons/userProfile.svg" alt="Ícone de perfil do usuário">
                        <span class="cpf">CPF: </span>
                    </div>
                </div>
                <div class="exit-all-button-container">
                    <button class="exit-all-button">Sair do sistema</button>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="button-back-container">
            <a href="javascript:history.back()" class="button-back">
                <img src="../assets/icons/arrowLeft.svg" alt="Ícone de uma seta para voltar">
                Voltar</a>
        </div>
        <div class="actions-container">
            <div class="search-container">
                <input type="search" placeholder="Digite o número do protocolo...">
                <button>
                    <img src="../assets/icons/search.svg" alt="Ícone de pesquisa">
                </button>
            </div>
        </div>

        <!-- PRIMEIRO CONTAINER -->
        <div class="main-area-container">
            <div class="main-area-title-container">
                <h1>Solicitações Pendentes</h1>
                <div class="filter-container">
                    <button class="filter-button">
                        <img src="../assets/icons/filter.svg" alt="Ícone de filtro">
                    </button>
                    <div class="shadow-box filter-window hidden">
                        <div class="window-top-container">
                            <span>Filtrar por:</span>
                            <div class="close-window-button-container">
                                <button class="exit-button exit-filter">
                                    <img src="../assets/icons/error.svg" alt="Ícone de fechar">
                                </button>
                            </div>
                        </div>
                        
                        <div>
                            <button class="category-button priority">
                                Prioridade
                                <img src="../assets/icons/arrowDownFilter.svg" alt="Ícone de expandir">
                            </button>
                            <div class="options-container hidden priority-options">
                                <button class="option-button">Baixa</button>
                                <button class="option-button">Normal</button>
                                <button class="option-button">Alta</button>
                                <button class="option-button">Urgente</button>
                            </div>
                        </div>
                        <div>
                            <button class="category-button category">
                                Categoria
                                <img src="../assets/icons/arrowDownFilter.svg" alt="Ícone de expandir">
                            </button>
                            <div class="options-container hidden category-options">
                                <button class="option-button">
                                    <img src="" alt="">  
                                    Iluminação</button>
                                <button class="option-button">
                                    
                                    Asfalto</button>
                                <button class="option-button">
                                    <img src="" alt="">
                                    Grama</button>
                                <button class="option-button">
                                    <img src="" alt="">
                                    Ponto de ônibus</button>
                                <button class="option-button">
                                    <img src="" alt="">
                                    Outro</button>
                            </div>
                        </div>
                        <div class="clean-button-container hidden">
                            <button class="clean-button">Remover Filtro</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- main div -->
            <div class="cards-container pendentes">
                <div class="noCard-container hidden">
                    <img src="../assets/images/userSearching.svg" alt="Pessoa vendo solicitações">
                    <span>Nenhuma solicitação</span>
                </div>
            </div>

            <div class="pagination-container">
                <nav>
                    <ul>
                        <li>
                            <button class="unboxed-button">
                                <img src="../assets/icons/arrowLeft.svg" alt="Ícone de seta para ir à página anterior">
                            </button>
                        </li>
                        <li>
                            <button class="boxed-button selected-button">1</button>
                        </li>
                        <li>
                            <button class="boxed-button unselected-button">2</button>
                        </li>
                        <li>
                            <button class="boxed-button unselected-button disabled-button">...</button>
                        </li>
                        <li>
                            <button class="boxed-button unselected-button">5</button>
                        </li>
                        <li>
                            <button class="unboxed-button">
                                <img src="../assets/icons/arrowRight.svg" alt="Ícone de seta para ir à página posterior">
                            </button>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
        <!-- SEGUNDO CONTAINER -->
        <div class="main-area-container">
            <div class="main-area-title-container">
                <h1>Solicitações Concluídas</h1>
                <div class="filter-container">
                    <button class="filter-button">
                        <img src="../assets/icons/filter.svg" alt="Ícone de filtro">
                    </button>
                    <div class="shadow-box filter-window hidden">
                        <div class="window-top-container">
                            <span>Filtrar por:</span>
                            <div class="close-window-button-container">
                                <button class="exit-button exit-filter">
                                    <img src="../assets/icons/error.svg" alt="Ícone de fechar">
                                </button>
                            </div>
                        </div>
                        
                        <div>
                            <button class="category-button priority">
                                Prioridade
                                <img src="../assets/icons/arrowDownFilter.svg" alt="Ícone de expandir">
                            </button>
                            <div class="options-container hidden priority-options">
                                <button class="option-button">Baixa</button>
                                <button class="option-button">Normal</button>
                                <button class="option-button">Alta</button>
                                <button class="option-button">Urgente</button>
                            </div>
                        </div>
                        <div>
                            <button class="category-button category">
                                Categoria
                                <img src="../assets/icons/arrowDownFilter.svg" alt="Ícone de expandir">
                            </button>
                            <div class="options-container hidden category-options">
                                <button class="option-button">
                                    <img src="" alt="">  
                                    Iluminação</button>
                                <button class="option-button">
                                    
                                    Asfalto</button>
                                <button class="option-button">
                                    <img src="" alt="">
                                    Grama</button>
                                <button class="option-button">
                                    <img src="" alt="">
                                    Ponto de ônibus</button>
                                <button class="option-button">
                                    <img src="" alt="">
                                    Outro</button>
                            </div>
                        </div>
                        <div class="clean-button-container hidden">
                            <button class="clean-button">Remover Filtro</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- main div -->
            <div class="cards-container concluidos">
                <div class="noCard-container hidden">
                    <img src="../assets/images/userSearching.svg" alt="Pessoa vendo solicitações">
                    <span>Nenhuma solicitação</span>
                </div>
            </div>

            <div class="pagination-container">
                <nav>
                    <ul>
                        <li>
                            <button class="unboxed-button">
                                <img src="../assets/icons/arrowLeft.svg" alt="Ícone de seta para ir à página anterior">
                            </button>
                        </li>
                        <li>
                            <button class="boxed-button selected-button">1</button>
                        </li>
                        <li>
                            <button class="boxed-button unselected-button">2</button>
                        </li>
                        <li>
                            <button class="boxed-button unselected-button disabled-button">...</button>
                        </li>
                        <li>
                            <button class="boxed-button unselected-button">5</button>
                        </li>
                        <li>
                            <button class="unboxed-button">
                                <img src="../assets/icons/arrowRight.svg" alt="Ícone de seta para ir à página posterior">
                            </button>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
        <!-- TERCEIRO CONTAINER -->
        <div class="main-area-container">
            <div class="main-area-title-container">
                <h1>Solicitações Canceladas</h1>
                <div class="filter-container">
                    <button class="filter-button">
                        <img src="../assets/icons/filter.svg" alt="Ícone de filtro">
                    </button>
                    <div class="shadow-box filter-window hidden">
                        <div class="window-top-container">
                            <span>Filtrar por:</span>
                            <div class="close-window-button-container">
                                <button class="exit-button exit-filter">
                                    <img src="../assets/icons/error.svg" alt="Ícone de fechar">
                                </button>
                            </div>
                        </div>
                        
                        <div>
                            <button class="category-button priority">
                                Prioridade
                                <img src="../assets/icons/arrowDownFilter.svg" alt="Ícone de expandir">
                            </button>
                            <div class="options-container hidden priority-options">
                                <button class="option-button">Baixa</button>
                                <button class="option-button">Normal</button>
                                <button class="option-button">Alta</button>
                                <button class="option-button">Urgente</button>
                            </div>
                        </div>
                        <div>
                            <button class="category-button category">
                                Categoria
                                <img src="../assets/icons/arrowDownFilter.svg" alt="Ícone de expandir">
                            </button>
                            <div class="options-container hidden category-options">
                                <button class="option-button">
                                    <img src="" alt="">  
                                    Iluminação</button>
                                <button class="option-button">
                                    
                                    Asfalto</button>
                                <button class="option-button">
                                    <img src="" alt="">
                                    Grama</button>
                                <button class="option-button">
                                    <img src="" alt="">
                                    Ponto de ônibus</button>
                                <button class="option-button">
                                    <img src="" alt="">
                                    Outro</button>
                            </div>
                        </div>
                        <div class="clean-button-container hidden">
                            <button class="clean-button">Remover Filtro</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- main div -->
            <div class="cards-container cancelados">
                <div class="noCard-container hidden">
                    <img src="../assets/images/userSearching.svg" alt="Pessoa vendo solicitações">
                    <span>Nenhuma solicitação</span>
                </div>
            </div>

            <div class="pagination-container">
                <nav>
                    <ul>
                        <li>
                            <button class="unboxed-button">
                                <img src="../assets/icons/arrowLeft.svg" alt="Ícone de seta para ir à página anterior">
                            </button>
                        </li>
                        <li>
                            <button class="boxed-button selected-button">1</button>
                        </li>
                        <li>
                            <button class="boxed-button unselected-button">2</button>
                        </li>
                        <li>
                            <button class="boxed-button unselected-button disabled-button" disabled>...</button>
                        </li>
                        <li>
                            <button class="boxed-button unselected-button">5</button>
                        </li>
                        <li>
                            <button class="unboxed-button">
                                <img src="../assets/icons/arrowRight.svg" alt="Ícone de seta para ir à página posterior">
                            </button>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </main>
    <footer>

    </footer>
    <script type="module" src="../javascript/dashboardCard.js"></script>
    <script type="module" src="../javascript/dashboardFuncionario.js"></script>
    <script type="module" src="../javascript/profileWindow.js"></script>
</body>
</html>
