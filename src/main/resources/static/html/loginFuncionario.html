<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/formularios.css">
    <link rel="stylesheet" href="../css/cadastroFuncionario.css">
    <title>Login de funcionário - ObservaAção</title>
</head>
<body>
    <main>
        <div class="button-back-container">
            <a href="javascript:history.back()" class="button-back">
                <img src="../assets/icons/arrowLeft.svg" alt="Ícone de uma seta para voltar">
                Voltar</a>
        </div>
        <div>
            <div class="shadow-box">
                <div class="box-title-container">
                    <h1 class="logo">ObservaAção</h1>
                    <h2>Bem vindo! Para acessar o sistema, realize o login:</h2>
                </div>
                <div class="box-main-container">
                    <div class="box-main-img">
                        <img src="../assets/images/employeeSpeaking.svg" alt="Desenho de um funcionário falando em um megafone">
                    </div>
                    <form class="form-body">
                        <div class="form-body-inputs">
                            <div class="input-container">
                                <label for="email" class="input-label">E-mail:</label>
                                <input id="email" name="email" placeholder="Digite seu e-mail cadastrado aqui" class="input-box">
                            </div>
                            <div class="input-container">
                                <label for="senha" class="input-label">Senha:</label>
                                <input id="senha" name="senha" placeholder="Digite sua senha aqui" class="input-box" type="password">
                            </div>
                        </div>
                        <div>
                            <button type="submit" class="button-blue">Acessar</button>
                        </div>
                    </form>
                </div>
                <div class="form-body-link-container">
                    <span>
                        Não tem conta?
                        <a href="./cadastroFuncionario.html">Cadastre-se aqui</a>
                    </span>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="../javascript/loginFuncionario.js"></script>
</body>
</html>
