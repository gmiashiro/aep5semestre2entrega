<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/formularios.css">
    <link rel="stylesheet" href="../css/loginMorador.css">
    <title>Login - ObservaAção</title>
</head>
<body>
    <main>
        <div class="button-back-container">
            <a href="" class="button-back">
                <img src="../assets/icons/arrowLeft.svg" alt="Ícone de uma seta para voltar">
                Voltar</a>
        </div>
        <div>

            <div class="shadow-box form-body">
                <div class="form-text">
                    <h1 class="logo">ObservaAção</h1>
                    <h3>O sistema em que você exerce seu direito para uma cidade melhor</h3>
                </div>
                <div class="form-middle">
                    <div>
                        <img src="../assets/images/userSpeaking.svg" alt="Desenho de um morador falando em um megafone">
                    </div>
                    <form>
                        <div class="input-container">
                            <label for="inputCpf" class="input-label">CPF:</label>
                            <input name="inputCpf" placeholder="Digite seu CPF aqui..." class="input-box">
                        </div>
                        <div>
                            <button type="submit" class="button-blue">Acessar</button>
                        </div>
                    </form>
                </div>
                <div class="form-bottom-info">
                    <span>
                        Caso deseja realizar o login de funcionário, 
                        <a href="./loginFuncionario.html" class="link-blue">clique aqui</a>
                    </span>
                </div>
            </div>

        </div>
    </main>
</body>
</html>
