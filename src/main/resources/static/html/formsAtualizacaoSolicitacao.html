<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/formularios.css">
    <link rel="stylesheet" href="../css/dashboardCards.css">
    <link rel="stylesheet" href="../css/formsAtualizacaoSolicitacao.css">
    <title>Atualização de Solicitação - ObservaAção</title>
</head>
<body>
    <header>
        <!-- Parte da LOGO -->
        <div class="header-logo">
            <a href="./landingPage.html" class="logo">ObservaAção</a>
            <a href="./landingPage.html" class="header-button">Como usar?</a>
        </div>
        <!-- Parte do botão do perfil do usuário -->
        <div class="header-profile">
            <button class="profile-button">
                <img src="../assets/icons/userProfile.svg" alt="Ícone de perfil do usuário">
            </button>
            <div class="shadow-box profile-window-container window-hidden">
                <div class="exit-button-container">
                    <button class="exit-button">
                        <img src="../assets/icons/error.svg" alt="Ícone de fechar">
                    </button>
                </div>
                <div class="profile-window-info-container">
                    <span class="profile-window-title">Perfil</span>
                    <div class="profile-window-data">
                        <img src="../assets/icons/userProfile.svg" alt="Ícone de perfil do usuário">
                        <span class="cpf">CPF: </span>
                    </div>
                </div>
                <div class="exit-all-button-container">
                    <button class="exit-all-button">Sair do sistema</button>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="button-back-container">
            <a href="javascript:history.back()" class="button-back">
                <img src="../assets/icons/arrowLeft.svg" alt="Ícone de uma seta para voltar">
                Voltar</a>
        </div>
        <div>
            <div>
                <h1>Atualização de status de uma solicitação</h1>
            </div>
            <div class="boxes-container">
                <!-- CARD -->
                
                <!-- fim do card -->
                <div class="shadow-box form-container">
                    <div>
                        <span class="form-title">Escolha um novo status e escreva uma justificativa sobre.</span>
                    </div>
                    <form id="form-atualizacao" class="form-body">
                        <div class="form-inputs">
                            <div class="input-container">
                                <label for="novo-status" class="input-label">Novo status:</label>
                                <div>
                                    <select required ="novo-status" id="novo-status" class="input-box select">
                                        <option value="">Selecione o status</option>
                                        <option value="2">Triagem</option>
                                        <option value="3">Em andamento</option>
                                        <option value="4">Resolvido</option>
                                        <option value="5">Fechado</option>
                                    </select>
                                    <span class="feedback feedback-hidden"></span>
                                </div>
                            </div>
                            <div class="input-container">
                                <label for="justificativa" class="input-label">Justificativa:</label>
                                <textarea required name="justificativa" id="justificativa" placeholder="Escreva uma justificativa referente ao novo status" class="input-box" maxlength="500" wrap="soft"></textarea>
                                <span class="feedback feedback-hidden"></span>
                            </div>
                        </div>
                        <div class="button-container">
                            <button class="button-blue" type="submit">Atualizar</button>
                        </div>
                    </form>
                    
                </div>
            </div>
        </div>
        
        
    </main>
    <footer>

    </footer>

    <script type="module" src="../javascript/atualizacaoSolicitacao.js"></script>
    <script type="module" src="../javascript/profileWindow.js"></script>
    <script src="../javascript//formularios.js"></script>
</body>
</html>
