<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/formularios.css">
    <link rel="stylesheet" href="../css/dashboardCards.css">
    <title>Atualização de Solicitação - ObservaAção</title>
</head>
<body>
    <main>
        <div class="shadow-box">
            
            <!-- Primeira linha -->
            <div>
                <div>
                    <div>
                        <img src="../assets/icons/light.svg" alt="Ícone da classificação de iluminação">
                    </div>
                    <span>N° 1234</span>
                </div>
                <div>
                    <span>Em andamento</span>
                </div>
            </div>

            <!-- Segunda linha -->
            <div>
                <div>
                    <span>Alta</span>
                </div>
                <div>
                    <img src="../assets/icons/alarmBlack.svg" alt="Ícone de despertador">
                    <span>Falta 10 dias</span>
                </div>
            </div>

            <!-- Terceira linha -->
            <div>
                <div>
                    <h4>Poste sem lâmpada</h4>
                </div>
                <div>
                    <img src="../assets/icons/adress.svg" alt="Ícone de localização">
                    <span>Rua teste, 1234</span>
                </div>
            </div>

            <!-- Quarta linha -->
            <div>
                <div>
                    <span>Progresso</span>
                    <span>Etapa 3 de 4</span>
                </div>
                <div>
                    <progress max="100" value="75"></progress>
                </div>
            </div>

            <!-- Quinta linha -->
            <hr>

            <!-- Sexta linha -->
            <div>
                <div>
                    <span>Descrição:</span>
                    <span>Uai a descrição vai aqui</span>
                </div>
                <div>
                    <div>
                        <span>Justificativa:</span>
                        <span>Uai a justificativa vai aqui</span>
                    </div>
                    <div>
                        <span>Responsável: Robson</span>
                    </div>
                </div>
            </div>

            <!-- Sétima linha -->
            <div>
                <div>
                    <img src="../assets/icons/timeCreated.svg" alt="Ícone para a data de criação">
                    <span>Criado em: 10/10/2023</span>
                </div>
                <div>
                    <img src="../assets/icons/timeUpdated.svg" alt="Ícone para a data de atualização">
                    <span>Atualizado em: 10/10/2023</span>
                </div>
                <div>
                    <img src="../assets/icons/alarmGrey.svg" alt="Ícone para o fim do prazo de resolução">
                    <span>Prazo de resolução: 10/10/2023</span>
                </div>
            </div>

        </div>
    </main>
</body>
</html>
